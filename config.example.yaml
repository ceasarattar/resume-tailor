# config.example.yaml — committed template.
# setup copies this to config.yaml (gitignored) and fills machine-specific values.
# Edit config.yaml, not this file, for machine-specific values (like your API key).

# ----------------------------------------------------------------- LLM provider
# "anthropic" (default, recommended): Claude via the official SDK. Best quality and
#   the most consistent tailoring + humanization. Needs an API key (below).
# "ollama": fully local, free, no key — uses a model you've pulled with Ollama.
provider: "anthropic"

# --- Anthropic (Claude) settings -------------------------------------------------
# Model. Default is the cheap + accurate Sonnet. Options (cost per resume is rough):
#   claude-haiku-4-5    cheapest, fast            (~0.5 cent)
#   claude-sonnet-4-6   best balance (default)    (~1-3 cents)
#   claude-opus-4-8     highest quality           (~5-10 cents)
anthropic_model: "claude-sonnet-4-6"

# Your Anthropic API key. PREFER the ANTHROPIC_API_KEY environment variable; this
# config line is a fallback (config.yaml is gitignored, so it stays on this machine).
# Create a key at https://platform.claude.com/settings/keys — this is a pay-as-you-go
# API key, SEPARATE from any ChatGPT/Claude.ai subscription. Add a few dollars of
# credit and it covers hundreds of resumes.
anthropic_api_key: ""

# Max output tokens per LLM call (a tailoring plan is well under this).
anthropic_max_tokens: 4096

# --- Ollama (local fallback) settings -------------------------------------------
# Only used when provider: "ollama". Also provides embeddings for RAG when available.
ollama_base_url: "http://localhost:11434/v1"
machine_tier: "windows"            # "mac" or "windows"; selects tailor_model below
tailor_model:
  mac: "qwen3:8b"
  windows: "qwen3:14b"
embed_model: "nomic-embed-text"    # RAG embeddings (best-effort; via Ollama only)

# --------------------------------------------------------------------- features
humanize: true        # run the humanizer pass (natural voice, no AI tells)
one_page: true        # guarantee a single-page PDF by trimming + recompiling

# Application autofill (Chrome extension). answer_llm lets the answer bank draft
# grounded free-text answers (e.g. "why this company?") for fields it can't fill
# deterministically. Set false to keep autofill 100% offline/no-API.
answer_llm: true

# RAG retrieval (past corrections injected into the tailoring prompt)
rag_top_k: 4

# ----------------------------------------------------------------- LaTeX compile
# Default renderer is Tectonic (XeTeX). Leave as "tectonic" to use the one on PATH;
# setup may set an absolute path to a downloaded binary.
tectonic_path: "tectonic"
# Optional TeX Live pdflatex fallback for a "final submission" build (--final flag).
pdflatex_fallback:
  path: null

# FastAPI server
server_port: 8000

# Where tailored resumes are written
output_dir: "outputs"

# Auto git push on app exit (run.sh / run.bat)
github_auto_push: true

# ----------------------------------------------------------------- discovery pipeline
# The autonomous pipeline (python -m app.pipeline run): discover -> score -> tailor
# -> queue. It reads jobs straight from public ATS board APIs (the same JSON the
# companies' own careers pages call — stable, structured, ToS-safe), scores each
# against your real profile, tailors a résumé for the matches, and queues them.
discovery:
  max_age_days: 3              # only consider jobs posted within the last N days
  # --- breadth: scrape the big aggregators (JobSpy: Indeed/Google/ZipRecruiter) ---
  aggregator:
    enabled: true
    sites: ["indeed", "google", "zip_recruiter"]   # indeed = no rate limit, the workhorse
    location: "United States"
    hours_old: 72              # JobSpy's freshness filter (3 days)
    results_per_term: 60       # results pulled per search term per run
    remotive: true             # also pull the keyless Remotive remote-tech feed
    search_terms:              # everything related to you
      - "software engineer"
      - "software developer"
      - "data engineer"
      - "data scientist"
      - "machine learning engineer"
      - "ai engineer"

  # --- optional: clean direct-apply boards for specific companies ---
  #   boards.greenhouse.io/<token>  |  jobs.lever.co/<token>  |  jobs.ashbyhq.com/<token>
  sources: []                  # e.g. [{ats: greenhouse, token: stripe}]
  max_per_source: 1000

  # --- cost controls (Claude) ---
  # The fit-judge is a high-volume classification task -> run it on a cheap model.
  # Tailoring (creative + honesty-critical) stays on anthropic_model (e.g. Sonnet).
  judge_model: "claude-haiku-4-5"
  judge_per_company: 2         # LLM-judge only the N most promising roles per company
  max_per_company: 2           # tailor/apply at most N roles per company
  score_cap: 120               # max LLM fit-judgments per run (Haiku ~cents; resumable)
  tailor_cap: 8                # max résumés generated per run (the real $ — Sonnet)

  match:
    min_score: 0.6             # recommend only if fit-judge score >= this
    min_salary: 90000          # drop roles whose stated max pay is below this (unstated = kept)
    # Location rule: accept ONLY US-remote roles OR onsite/hybrid roles in the
    # locations_include geography (set it to where you can physically work).
    remote_ok: true
    locations_include: ["chicago","illinois"]
    titles_include: ["engineer","developer","software","backend","frontend","full stack","data","platform","infrastructure","security","machine learning","sde","analytics","scientist"]
    titles_exclude: ["senior","sr."," sr ","staff","principal","lead","manager","director","vp","head of","architect","sales"," ii"," iii"," phd"]

  apply:
    mode: review               # "review" (fill -> human approves) | "auto" (guardrailed)
    daily_cap: 15              # hard cap on auto-submits per day
