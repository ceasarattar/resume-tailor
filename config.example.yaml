# config.example.yaml — committed template.
# setup copies this to config.yaml (gitignored) and fills machine-specific values.
# Edit config.yaml, not this file, for machine-specific values (like your API key).

# ----------------------------------------------------------------- LLM provider
# "anthropic" (default, recommended): Claude via the official SDK. Best quality and
#   the most consistent tailoring + humanization. Needs an API key (below).
# "ollama": fully local, free, no key — uses a model you've pulled with Ollama.
provider: "anthropic"

# --- Anthropic (Claude) settings -------------------------------------------------
# Model. Default is the cheap + accurate Sonnet. Options (cost per resume is rough):
#   claude-haiku-4-5    cheapest, fast            (~0.5 cent)
#   claude-sonnet-4-6   best balance (default)    (~1-3 cents)
#   claude-opus-4-8     highest quality           (~5-10 cents)
anthropic_model: "claude-sonnet-4-6"

# Your Anthropic API key. PREFER the ANTHROPIC_API_KEY environment variable; this
# config line is a fallback (config.yaml is gitignored, so it stays on this machine).
# Create a key at https://platform.claude.com/settings/keys — this is a pay-as-you-go
# API key, SEPARATE from any ChatGPT/Claude.ai subscription. Add a few dollars of
# credit and it covers hundreds of resumes.
anthropic_api_key: ""

# Max output tokens per LLM call (a tailoring plan is well under this).
anthropic_max_tokens: 4096

# --- Ollama (local fallback) settings -------------------------------------------
# Only used when provider: "ollama". Also provides embeddings for RAG when available.
ollama_base_url: "http://localhost:11434/v1"
machine_tier: "windows"            # "mac" or "windows"; selects tailor_model below
tailor_model:
  mac: "qwen3:8b"
  windows: "qwen3:14b"
embed_model: "nomic-embed-text"    # RAG embeddings (best-effort; via Ollama only)

# --------------------------------------------------------------------- features
humanize: true        # run the humanizer pass (natural voice, no AI tells)
one_page: true        # guarantee a single-page PDF by trimming + recompiling

# Application autofill (Chrome extension). answer_llm lets the answer bank draft
# grounded free-text answers (e.g. "why this company?") for fields it can't fill
# deterministically. Set false to keep autofill 100% offline/no-API.
answer_llm: true

# RAG retrieval (past corrections injected into the tailoring prompt)
rag_top_k: 4

# ----------------------------------------------------------------- LaTeX compile
# Default renderer is Tectonic (XeTeX). Leave as "tectonic" to use the one on PATH;
# setup may set an absolute path to a downloaded binary.
tectonic_path: "tectonic"
# Optional TeX Live pdflatex fallback for a "final submission" build (--final flag).
pdflatex_fallback:
  path: null

# FastAPI server
server_port: 8000

# Where tailored resumes are written
output_dir: "outputs"

# Auto git push on app exit (run.sh / run.bat)
github_auto_push: true
